<!DOCTYPE html>
<html>
<head>

<title>Geoportal Kelly Merchan</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.4.0/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v10.4.0/dist/ol.js"></script>

<style>

body {
    font-family: Arial;
    margin: 0;
    background-color: #40E0D0;
}

/* SCROLL SUAVE */
html {
    scroll-behavior: smooth;
}

.menu {
    display: flex;
    background-color: #008B8B;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.menu button {
    flex: 1;
    padding: 15px;
    border: none;
    background-color: #008B8B;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.menu button:hover {
    background-color: #00CED1;
}

/* TODAS LAS SECCIONES VISIBLES */
.tab {
    display: block;
    padding: 20px;
}

.caja {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 30px;
}

#map {
    width: 100%;
    height: 500px;
}

</style>

</head>

<body>

<!-- ENCABEZADO -->
<div style="
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #37474F;
    padding: 15px;
    border-bottom: 3px solid #B0BEC5;
">

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUlhBpSI8NBXIEjTvPA264F3bcvU5Cp1o2fA&s"
         style="height:60px; margin-right:15px; background:white; border-radius:8px; padding:5px;">

    <h1 style="margin:0; font-size:28px; color:white;">
        🌎 Geoportal - Kelly Yudiana Merchan
    </h1>

</div>

<!-- MENÚ -->
<div class="menu">
    <button onclick="document.getElementById('cv').scrollIntoView()">CV</button>
    <button onclick="document.getElementById('visor').scrollIntoView()">Visor WMS</button>
    <button onclick="document.getElementById('openlayers').scrollIntoView()">OpenLayers</button>
    <button onclick="document.getElementById('qgis').scrollIntoView()">QGIS Cloud</button>
    <button onclick="document.getElementById('descargas').scrollIntoView()">Descargas</button>
    <button onclick="document.getElementById('contacto').scrollIntoView()">Contacto</button>
</div>

<!-- CV -->
<div id="cv" class="tab">
<div class="caja">
<h2>Curriculum Vitae</h2>

<iframe src="https://keyumerchan-collab.github.io/GeoportalFinal/CV_Yudiana.pdf"
        width="100%" height="500"
        style="border:none;"
        oncontextmenu="return false;">
</iframe>

</div>
</div>

<!-- VISOR WMS -->
<div id="visor" class="tab">
<div class="caja">

<h2>Visor WMS básico</h2>

<img id="mapa" width="100%"
src="https://geoserver.idesinde.com:8443/geoserver/merchan/wms?service=WMS&request=GetMap&layers=merchan:ComposicionMerchan&bbox=-79,-1,-73,4&width=800&height=500&srs=EPSG:4326&format=image/png">

<br><br>

<button class="btn est" onclick='cambiar("estaciones")'>📍 Estaciones</button>
<button class="btn agua" onclick='cambiar("cuerposagua")'>💧 Cuerpos Agua</button>
<button class="btn dptos" onclick='cambiar("dptos")'>🗺️ Departamentos</button>
<button class="btn resg" onclick='cambiar("resguardoawa")'>🌿 Resguardos</button>
<button class="btn comp" onclick='cambiar("ComposicionMerchan")'>🌎 Composición</button>

</div>

<!-- OPENLAYERS -->
<div id="openlayers" class="tab">
<div class="caja">

<h2>Visor avanzado OpenLayers</h2>

<div>
<label><input type="checkbox" checked onchange="toggleLayer('comp')"> Composición</label>
<label><input type="checkbox" onchange="toggleLayer('est')"> Estaciones</label>
<label><input type="checkbox" onchange="toggleLayer('agua')"> Cuerpos de agua</label>
<label><input type="checkbox" onchange="toggleLayer('dptos')"> Departamentos</label>
<label><input type="checkbox" onchange="toggleLayer('resg')"> Resguardos</label>
</div>

<div id="map"></div>

</div>
</div>

<!-- QGIS CLOUD -->
<div id="qgis" class="tab">
<div class="caja">

<h2>QGIS Cloud</h2>

<iframe width="100%" height="600"
src="https://qgiscloud.com/Yudiana_Merchan/ParcticaCloud/?l=Est_Precipitaciones%2CResg_PuebloAwa%2CCuerpo_Agua%2Cdptos%2CTemperatura_dptos&bl=mapnik&t=ParcticaCloud&e=-9000000,-500000,-7000000,1500000">
</iframe>

</div>
</div>

<!-- DESCARGAS -->
<div id="descargas" class="tab">
<div class="caja">

<h2>Descargas de capas</h2>

<h3>📍 Estaciones</h3>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/ows?service=WFS&request=GetFeature&typeName=merchan:estaciones&outputFormat=SHAPE-ZIP">Shapefile</a><br>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/wms/kml?layers=merchan:estaciones">KML</a><br>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/ows?service=WFS&request=GetFeature&typeName=merchan:estaciones&outputFormat=GML2">GML</a>

<h3>💧 Cuerpos de agua</h3>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/ows?service=WFS&request=GetFeature&typeName=merchan:cuerposagua&outputFormat=SHAPE-ZIP">Shapefile</a><br>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/wms/kml?layers=merchan:cuerposagua">KML</a><br>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/ows?service=WFS&request=GetFeature&typeName=merchan:cuerposagua&outputFormat=GML2">GML</a>

<h3>🗺️ Departamentos</h3>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/ows?service=WFS&request=GetFeature&typeName=merchan:dptos&outputFormat=SHAPE-ZIP">Shapefile</a><br>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/wms/kml?layers=merchan:dptos">KML</a><br>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/ows?service=WFS&request=GetFeature&typeName=merchan:dptos&outputFormat=GML2">GML</a>

<h3>🌿 Resguardos Awá</h3>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/ows?service=WFS&request=GetFeature&typeName=merchan:resguardoawa&outputFormat=SHAPE-ZIP">Shapefile</a><br>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/wms/kml?layers=merchan:resguardoawa">KML</a><br>
<a href="https://geoserver.idesinde.com:8443/geoserver/merchan/ows?service=WFS&request=GetFeature&typeName=merchan:resguardoawa&outputFormat=GML2">GML</a>

</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="tab">
<div class="caja">

<h2>Contacto</h2>

<form onsubmit="enviarCorreo(); return false;">
    
    <label>Nombre:</label><br>
    <input type="text" id="nombre" required style="width:100%; padding:8px;"><br><br>

    <label>Correo:</label><br>
    <input type="email" id="correo" required style="width:100%; padding:8px;"><br><br>

    <label>Mensaje:</label><br>
    <textarea id="mensaje" required style="width:100%; padding:8px;" rows="5"></textarea><br><br>

    <button type="submit">Enviar mensaje</button>

</form>

</div>
</div>

<script>

/* BLOQUEAR CLICK DERECHO */
document.addEventListener('contextmenu', event => event.preventDefault());

// WMS
function cambiar(capa) {
    document.getElementById("mapa").src =
    "https://geoserver.idesinde.com:8443/geoserver/merchan/wms?service=WMS&request=GetMap&layers=merchan:" + capa +
    "&bbox=-79,-1,-73,4&width=800&height=500&srs=EPSG:4326&format=image/png";
}

// CAPAS
const capas = {
    comp: new ol.layer.Tile({
        source: new ol.source.TileWMS({
            url: 'https://geoserver.idesinde.com:8443/geoserver/merchan/wms',
            params: {'LAYERS': 'merchan:ComposicionMerchan'}
        }), visible: true
    }),
    est: new ol.layer.Tile({
        source: new ol.source.TileWMS({
            url: 'https://geoserver.idesinde.com:8443/geoserver/merchan/wms',
            params: {'LAYERS': 'merchan:estaciones'}
        }), visible: false
    }),
    agua: new ol.layer.Tile({
        source: new ol.source.TileWMS({
            url: 'https://geoserver.idesinde.com:8443/geoserver/merchan/wms',
            params: {'LAYERS': 'merchan:cuerposagua'}
        }), visible: false
    }),
    dptos: new ol.layer.Tile({
        source: new ol.source.TileWMS({
            url: 'https://geoserver.idesinde.com:8443/geoserver/merchan/wms',
            params: {'LAYERS': 'merchan:dptos'}
        }), visible: false
    }),
    resg: new ol.layer.Tile({
        source: new ol.source.TileWMS({
            url: 'https://geoserver.idesinde.com:8443/geoserver/merchan/wms',
            params: {'LAYERS': 'merchan:resguardoawa'}
        }), visible: false
    })
};

// MAPA
var map = new ol.Map({
    target: 'map',
    layers: [
        new ol.layer.Tile({ source: new ol.source.OSM() }),
        capas.comp, capas.est, capas.agua, capas.dptos, capas.resg
    ],
    view: new ol.View({
        center: ol.proj.fromLonLat([-76.5, 1.5]),
        zoom: 7
    })
});

// CONTROL
function toggleLayer(nombre) {
    capas[nombre].setVisible(!capas[nombre].getVisible());
}

// CORREO
function enviarCorreo() {
    var nombre = document.getElementById("nombre").value;
    var correo = document.getElementById("correo").value;
    var mensaje = document.getElementById("mensaje").value;

    window.location.href =
    "mailto:kellyyudiana@gmail.com?subject=Mensaje Geoportal&body="
    + "Nombre: " + nombre + "%0D%0ACorreo: " + correo + "%0D%0AMensaje: " + mensaje;
}

</script>

</body>
</html>
